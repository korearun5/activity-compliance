spring:
  datasource:
    url: ${APP_DB_URL:jdbc:postgresql://localhost:5432/activity_platform}

app:
  auth:
    secret: ${APP_JWT_SECRET:local-development-only-jwt-secret-change-before-prod}
  cors:
    allowed-origins:
      - ${APP_CORS_ALLOWED_ORIGIN_WEB:http://localhost:19006}
      - http://localhost:8081
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:false}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    tenant-code: ${APP_SEED_TENANT_CODE:default}
    tenant-name: ${APP_SEED_TENANT_NAME:Local Development Client}
    enabled-modules:
      - MEMBER_DATA
      - LAND_RECORDS
      - GEO_TAGGING
      - CROP_PLANNING
      - INPUT_DEMAND
      - ADVISORY
      - ACTIVITY_COMPLIANCE
      - EVIDENCE_REVIEW
      - REPORT_EXPORT
      - SUSTAINABILITY
    users:
      - username: ${APP_SEED_ADMIN_USERNAME:admin}
        password: ${APP_SEED_ADMIN_PASSWORD:arun}
        display-name: ${APP_SEED_ADMIN_DISPLAY_NAME:Platform Admin}
        phone: ${APP_SEED_ADMIN_PHONE:}
        location-name: ${APP_SEED_ADMIN_LOCATION:Head Office}
        site-name: ${APP_SEED_ADMIN_SITE:Operations}
        roles:
          - ADMIN
      - username: ${APP_SEED_FPO_MANAGER_USERNAME:fpo-manager}
        password: ${APP_SEED_FPO_MANAGER_PASSWORD:local-fpo-manager-password}
        display-name: ${APP_SEED_FPO_MANAGER_DISPLAY_NAME:Pilot FPO Manager}
        phone: ${APP_SEED_FPO_MANAGER_PHONE:}
        location-name: ${APP_SEED_FPO_MANAGER_LOCATION:Wagholi}
        site-name: ${APP_SEED_FPO_MANAGER_SITE:Pilot FPO}
        roles:
          - FPO_MANAGER
      - username: ${APP_SEED_FIELD_COORDINATOR_USERNAME:field-coordinator}
        password: ${APP_SEED_FIELD_COORDINATOR_PASSWORD:local-field-coordinator-password}
        display-name: ${APP_SEED_FIELD_COORDINATOR_DISPLAY_NAME:Field Coordinator}
        phone: ${APP_SEED_FIELD_COORDINATOR_PHONE:}
        location-name: ${APP_SEED_FIELD_COORDINATOR_LOCATION:Wagholi}
        site-name: ${APP_SEED_FIELD_COORDINATOR_SITE:Pilot FPO}
        roles:
          - FIELD_COORDINATOR
  storage:
    provider: ${APP_STORAGE_PROVIDER:local}
    local:
      root-path: ${APP_LOCAL_STORAGE_PATH:./storage/local}
