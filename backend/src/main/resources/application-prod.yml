spring:
    application:
        name: activity-compliance-backend
    datasource:
        url: ${APP_DB_URL}
        username: ${APP_DB_USERNAME}
        password: ${APP_DB_PASSWORD}
    flyway:
        enabled: true
        locations: classpath:db/migration
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                format_sql: false
                jdbc:
                    time_zone: UTC

server:
    port: ${APP_PORT:8080}
    forward-headers-strategy: framework
    http2:
        enabled: true
    ssl:
        enabled: ${APP_SSL_ENABLED:false}
        key-store: ${APP_SSL_KEYSTORE_PATH:}
        key-store-password: ${APP_SSL_KEYSTORE_PASSWORD:}
        key-store-type: ${APP_SSL_KEYSTORE_TYPE:PKCS12}
        key-alias: ${APP_SSL_KEY_ALIAS:tomcat}

management:
    endpoint:
        health:
            probes:
                enabled: true
    endpoints:
        web:
            exposure:
                include: health,info,metrics

springdoc:
    api-docs:
        enabled: ${APP_OPENAPI_ENABLED:false}
    swagger-ui:
        enabled: ${APP_SWAGGER_UI_ENABLED:false}

logging:
    level:
        root: ${APP_LOG_LEVEL_ROOT:INFO}
        com.activityplatform: ${APP_LOG_LEVEL_APP:INFO}
        org.springframework.security: ${APP_LOG_LEVEL_SECURITY:WARN}
    pattern:
        level: "%5p [requestId:%X{requestId:-}]"

app:
    auth:
        issuer: ${APP_JWT_ISSUER:activity-compliance}
        access-token-ttl: ${APP_ACCESS_TOKEN_TTL:PT30M}
        refresh-token-ttl: ${APP_REFRESH_TOKEN_TTL:P7D}
        secret: ${APP_JWT_SECRET}
    seed:
        enabled: ${APP_SEED_ENABLED:false}
        tenant-code: ${APP_SEED_TENANT_CODE:default}
        tenant-name: ${APP_SEED_TENANT_NAME:Default Client}
    cors:
        allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
        allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:false}
    storage:
        provider: ${APP_STORAGE_PROVIDER:minio}
        max-upload-bytes: ${APP_MAX_UPLOAD_BYTES:10485760}
        local:
            root-path: ${APP_LOCAL_STORAGE_PATH:./storage/local}
        minio:
            endpoint: ${APP_MINIO_ENDPOINT}
            bucket: ${APP_MINIO_BUCKET}
            access-key: ${APP_MINIO_ACCESS_KEY}
            secret-key: ${APP_MINIO_SECRET_KEY}
            region: ${APP_MINIO_REGION:}
            secure: ${APP_MINIO_SECURE:true}
            create-bucket-if-missing: ${APP_MINIO_CREATE_BUCKET_IF_MISSING:false}
